<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ARIA Skills Architecture</title>
  <desc id="desc">ARIA orchestrator connected to six governed skills and two specialized agents.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5FAFF"/>
      <stop offset="1" stop-color="#EEF7F4"/>
    </linearGradient>
    <linearGradient id="header" x1="210" y1="70" x2="1190" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B5CAB"/>
      <stop offset="1" stop-color="#00A88F"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="2000" height="2000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 18px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #FFFFFF; }
      .subtitle { font: 500 13px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #E9F3FF; }
      .card-title { font: 700 15px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #0E1B2A; }
      .card-meta { font: 500 12px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #35506B; }
      .section-title { font: 700 16px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #12314F; }
      .badge { font: 700 11px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
      .label { font: 600 12px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #18314B; }
      .line { stroke: #3F7AB8; stroke-width: 2.5; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <rect x="210" y="70" width="980" height="120" rx="18" fill="url(#header)" filter="url(#shadow)"/>
  <text x="700" y="118" text-anchor="middle" class="title">ARIA Orchestrator Agent</text>
  <text x="700" y="148" text-anchor="middle" class="subtitle">Consumes governed skills, wires workflows, and enforces OASF policy</text>

  <line x1="700" y1="190" x2="700" y2="248" class="line"/>
  <line x1="230" y1="248" x2="1170" y2="248" class="line"/>

  <line x1="230" y1="248" x2="230" y2="286" class="line"/>
  <line x1="418" y1="248" x2="418" y2="286" class="line"/>
  <line x1="606" y1="248" x2="606" y2="286" class="line"/>
  <line x1="794" y1="248" x2="794" y2="286" class="line"/>
  <line x1="982" y1="248" x2="982" y2="286" class="line"/>
  <line x1="1170" y1="248" x2="1170" y2="286" class="line"/>

  <g filter="url(#shadow)">
    <rect x="140" y="290" width="180" height="154" rx="14" fill="#FFFFFF" stroke="#C4D8EE"/>
    <rect x="148" y="300" width="74" height="22" rx="11" fill="#EAF3FF"/>
    <text x="185" y="315" text-anchor="middle" class="badge" fill="#0B5CAB">internal</text>
    <text x="230" y="354" text-anchor="middle" class="card-title">Validate</text>
    <text x="230" y="380" text-anchor="middle" class="card-meta">OASF checks</text>
    <text x="230" y="400" text-anchor="middle" class="card-meta">and ceilings</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="328" y="290" width="180" height="154" rx="14" fill="#FFFFFF" stroke="#C4D8EE"/>
    <rect x="336" y="300" width="74" height="22" rx="11" fill="#EAF3FF"/>
    <text x="373" y="315" text-anchor="middle" class="badge" fill="#0B5CAB">internal</text>
    <text x="418" y="354" text-anchor="middle" class="card-title">Publish</text>
    <text x="418" y="380" text-anchor="middle" class="card-meta">OCI build</text>
    <text x="418" y="400" text-anchor="middle" class="card-meta">and tagging</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="516" y="290" width="180" height="154" rx="14" fill="#FFFFFF" stroke="#F2CCA5"/>
    <rect x="524" y="300" width="96" height="22" rx="11" fill="#FFF4E6"/>
    <text x="572" y="315" text-anchor="middle" class="badge" fill="#B65A00">confidential</text>
    <text x="606" y="354" text-anchor="middle" class="card-title">Purview Sync</text>
    <text x="606" y="380" text-anchor="middle" class="card-meta">Labels and</text>
    <text x="606" y="400" text-anchor="middle" class="card-meta">lineage</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="704" y="290" width="180" height="154" rx="14" fill="#FFFFFF" stroke="#F2CCA5"/>
    <rect x="712" y="300" width="96" height="22" rx="11" fill="#FFF4E6"/>
    <text x="760" y="315" text-anchor="middle" class="badge" fill="#B65A00">confidential</text>
    <text x="794" y="354" text-anchor="middle" class="card-title">Dependency Scan</text>
    <text x="794" y="380" text-anchor="middle" class="card-meta">Transitive risk</text>
    <text x="794" y="400" text-anchor="middle" class="card-meta">and drift</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="892" y="290" width="180" height="154" rx="14" fill="#FFFFFF" stroke="#C4D8EE"/>
    <rect x="900" y="300" width="74" height="22" rx="11" fill="#EAF3FF"/>
    <text x="937" y="315" text-anchor="middle" class="badge" fill="#0B5CAB">internal</text>
    <text x="982" y="354" text-anchor="middle" class="card-title">Catalog</text>
    <text x="982" y="380" text-anchor="middle" class="card-meta">Index and</text>
    <text x="982" y="400" text-anchor="middle" class="card-meta">search</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1080" y="290" width="180" height="154" rx="14" fill="#FFFFFF" stroke="#C4D8EE"/>
    <rect x="1088" y="300" width="74" height="22" rx="11" fill="#EAF3FF"/>
    <text x="1125" y="315" text-anchor="middle" class="badge" fill="#0B5CAB">internal</text>
    <text x="1170" y="354" text-anchor="middle" class="card-title">Scaffold</text>
    <text x="1170" y="380" text-anchor="middle" class="card-meta">Template</text>
    <text x="1170" y="400" text-anchor="middle" class="card-meta">generation</text>
  </g>

  <text x="700" y="500" text-anchor="middle" class="section-title">Specialized Agents Compose Skill Subsets</text>

  <g filter="url(#shadow)">
    <rect x="220" y="530" width="450" height="250" rx="18" fill="#FFFFFF" stroke="#C5D9EE"/>
    <rect x="220" y="530" width="450" height="46" rx="18" fill="#F0F7FF"/>
    <text x="445" y="559" text-anchor="middle" class="card-title">Compliance Auditor</text>

    <rect x="270" y="615" width="160" height="120" rx="12" fill="#F7FBFF" stroke="#C5D9EE"/>
    <text x="350" y="658" text-anchor="middle" class="label">Dependency Scan</text>
    <text x="350" y="680" text-anchor="middle" class="card-meta">confidential</text>

    <rect x="460" y="615" width="160" height="120" rx="12" fill="#F7FBFF" stroke="#C5D9EE"/>
    <text x="540" y="658" text-anchor="middle" class="label">Purview Sync</text>
    <text x="540" y="680" text-anchor="middle" class="card-meta">confidential</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="730" y="530" width="450" height="250" rx="18" fill="#FFFFFF" stroke="#C5D9EE"/>
    <rect x="730" y="530" width="450" height="46" rx="18" fill="#ECFAF6"/>
    <text x="955" y="559" text-anchor="middle" class="card-title">Primitive Creator</text>

    <rect x="770" y="615" width="120" height="120" rx="12" fill="#F7FBFF" stroke="#C5D9EE"/>
    <text x="830" y="658" text-anchor="middle" class="label">Scaffold</text>
    <text x="830" y="680" text-anchor="middle" class="card-meta">internal</text>

    <rect x="905" y="615" width="120" height="120" rx="12" fill="#F7FBFF" stroke="#C5D9EE"/>
    <text x="965" y="658" text-anchor="middle" class="label">Catalog</text>
    <text x="965" y="680" text-anchor="middle" class="card-meta">internal</text>

    <rect x="1040" y="615" width="120" height="120" rx="12" fill="#F7FBFF" stroke="#C5D9EE"/>
    <text x="1100" y="658" text-anchor="middle" class="label">Validate</text>
    <text x="1100" y="680" text-anchor="middle" class="card-meta">internal</text>
  </g>

</svg>
